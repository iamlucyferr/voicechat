<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>SimpleVoice-Geyser</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: #1e1e1e;
                color: #f5f5f5;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 20px;
                margin: 0;
                min-height: 100vh;
            }
            h1 {
                color: #00d4ff;
            }
            form {
                background: #2a2a2a;
                padding: 20px;
                border-radius: 8px;
                box-shadow: 0 0 10px #000;
                width: 100%;
                max-width: 400px;
                margin-bottom: 20px;
            }
            label, input, select {
                display: block;
                width: 100%;
                margin-bottom: 10px;
                font-size: 14px;
            }
            input, select {
                padding: 8px;
                border-radius: 4px;
                border: none;
            }
            button {
                padding: 10px 15px;
                background-color: #00d4ff;
                border: none;
                color: #000;
                border-radius: 4px;
                cursor: pointer;
            }
            button:hover {
                background-color: #00aacc;
            }
            #micControls {
                display: flex;
                align-items: center;
                gap: 12px;
                margin-bottom: 10px;
            }

            #muteBtn {
                padding: 10px 18px;
                font-weight: bold;
                border-radius: 6px;
                transition: background-color 0.15s ease, color 0.15s ease;
            }

            #muteBtn.muted {
                background-color: #aa3333;
                color: #fff;
            }

            #muteBtn.unmuted {
                background-color: #33aa55;
                color: #000;
            }

            #micIndicator {
                width: 12px;
                height: 12px;
                border-radius: 50%;
                background-color: #444; /* idle */
                border: 1px solid #666;
            }

            #micIndicator.active {
                background-color: #33ff66;
            }
            #status {
                margin: 10px;
                padding: 8px 12px;
                border-radius: 4px;
                background: #333;
                border: 1px solid #666;
            }
            #log {
                width: 90%;
                max-width: 600px;
                height: 200px;
                overflow-y: auto;
                background: #2c2c2c;
                border: 1px solid #555;
                padding: 10px;
                margin: 10px 0;
                white-space: pre-wrap;
                font-family: monospace;
            }
            #inputArea {
                display: flex;
                justify-content: center;   /* center contents */
                align-items: center;
                gap: 10px;
                margin: 10px auto;         /* center container */
                width: 90%;
                max-width: 600px;
            }
        </style>
    </head>
    <body>
    <h1>Join Simple Voice Chat</h1>
    <form id="joinForm">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required autocomplete="username">

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required autocomplete="password">

        <label for="mic">Select Microphone:</label>
        <select id="mic" name="mic"></select>

        <label for="speaker">Select Speaker:</label>
        <select id="speaker" name="speaker"></select>

        <button type="submit" id="joinbtn">Join</button>
    </form>

    <div id="micControls">
        <button id="muteBtn" class="unmuted">Mute</button>
        <span id="micIndicator" title="Mic activity"></span>
    </div>

    <div id="status">Waiting to join...</div>
    <div id="log"></div>

    <div id="inputArea">
        <label for="msgInput"></label>
        <input type="text" id="msgInput" placeholder="Type message..." />
        <button id="messageButton">Send</button>
    </div>
    <button id="testSound" type="button">Test Sound</button>

    <script type="module">
        import { start } from '/client.js';
        start(); // manually triggers it
    </script>

    </body>
</html>
