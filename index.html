<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR-VoiceChat 3.1 | FerFer Studio Edition</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #080a0c;
            --panel: rgba(23, 28, 33, 0.75);
            --accent: #30D6FF; /* FerFer Signature Neon */
            --accent-glow: rgba(48, 214, 255, 0.3);
            --success: #00ff88;
            --danger: #ff3e3e;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #101a25, var(--bg));
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Responsive Container */
        .container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 20px;
            margin: auto;
            animation: fadeIn 0.8s ease-out;
        }

        @media (max-width: 1024px) {
            .container { grid-template-columns: 1fr; max-width: 750px; }
            .panel { min-height: auto !important; }
        }

        @media (max-width: 480px) {
            body { padding: 15px; }
            .panel { padding: 25px 20px !important; border-radius: 20px !important; }
            h1 { font-size: 18px !important; }
            .footer-license { position: relative !important; margin-top: 40px; }
            .controls-row { flex-direction: column; }
            .mic-status-ring { width: 100% !important; border-radius: 14px !important; height: 60px !important; }
        }

        .panel {
            background: var(--panel);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            min-height: 580px;
        }

        h1 {
            font-weight: 800;
            font-size: 22px;
            margin-bottom: 25px;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-glow);
            display: flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
        }

        .input-group { margin-bottom: 20px; }
        label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-dim);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        input[type="text"], input[type="password"], select {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 18px;
            color: white;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s;
        }

        select option { background: #1a1f24; color: white; }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* Neon Slider */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-glow);
            cursor: pointer;
        }

        button {
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            border-radius: 14px;
            border: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #joinbtn {
            background: var(--accent);
            color: #000;
            padding: 18px;
            width: 100%;
            font-size: 16px;
            box-shadow: 0 10px 20px var(--accent-glow);
        }

        #joinbtn:hover { transform: translateY(-3px); filter: brightness(1.1); }

        .controls-row { display: flex; gap: 15px; margin-top: 20px; }

        #muteBtn {
            flex: 1;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid var(--border);
        }

        #muteBtn.muted {
            background: rgba(255, 62, 62, 0.15);
            color: var(--danger);
            border-color: var(--danger);
        }

        .mic-status-ring {
            width: 54px;
            height: 54px;
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }

        .mic-status-ring.active {
            color: var(--success);
            border-color: var(--success);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        #status {
            font-size: 11px;
            padding: 12px 18px;
            background: rgba(48, 214, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 25px;
            color: var(--accent);
            border-left: 3px solid var(--accent);
            font-weight: 800;
            text-transform: uppercase;
        }

        .toggle-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .toggle-item span { font-size: 13px; font-weight: 600; opacity: 0.9; }

        .footer-license {
            margin-top: 50px;
            text-align: center;
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .studio-link { color: var(--accent); text-decoration: none; font-weight: 800; margin-left: 5px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h1><i class="fa-solid fa-tower-broadcast"></i> Join Voice</h1>

        <form id="joinForm">
            <div class="input-group">
                <label><i class="fa-solid fa-user"></i> Player Identity</label>
                <input type="text" id="username" required placeholder="Minecraft Username">
            </div>

            <div class="input-group">
                <label><i class="fa-solid fa-key"></i> Connection Token</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <div class="input-group">
                <label for="mic"><i class="fa-solid fa-microphone"></i> Input Hardware</label>
                <select id="mic">
                    <option value="">Allow mic access to see devices...</option>
                </select>
            </div>

            <div class="input-group">
                <label for="speaker"><i class="fa-solid fa-volume-high"></i> Output Hardware</label>
                <select id="speaker">
                    <option value="">System Default</option>
                </select>
            </div>

            <button type="submit" id="joinbtn">
                <i class="fa-solid fa-plug"></i> CONNECT TO GEYSER
            </button>
        </form>

        <div class="controls-row">
            <button id="muteBtn">
                <i class="fa-solid fa-microphone-slash"></i> MUTE
            </button>
            <div id="micIndicator" class="mic-status-ring">
                <i class="fa-solid fa-waveform-lines"></i>
            </div>
        </div>
    </div>

    <div class="panel">
        <h1><i class="fa-solid fa-gears"></i> Engine Config</h1>

        <div id="status">
            <i class="fa-solid fa-circle-dot fa-beat-fade"></i> ENGINE STATUS: STANDBY
        </div>

        <div style="flex-grow: 1;">
            <div class="input-group">
                <label><i class="fa-solid fa-sliders"></i> Capture Gain</label>
                <input type="range" min="0" max="100" value="75">
                <div style="display: flex; justify-content: space-between; font-size: 10px; color: var(--text-dim); margin-top: 8px;">
                    <span>QUIET</span><span>LOUD</span>
                </div>
            </div>

            <div class="input-group">
                <label><i class="fa-solid fa-ear-listen"></i> Activation Sensitivity</label>
                <input type="range" min="0" max="100" value="30">
            </div>

            <div class="toggle-list">
                <div class="toggle-item">
                    <span>Noise Suppression (Style 3.0)</span>
                    <input type="checkbox" checked style="accent-color: var(--accent); width: 18px; height: 18px;">
                </div>
                <div class="toggle-item">
                    <span>Acoustic Echo Cancellation</span>
                    <input type="checkbox" checked style="accent-color: var(--accent); width: 18px; height: 18px;">
                </div>
                <div class="toggle-item" style="border: none;">
                    <span>3D Proximity Rendering</span>
                    <input type="checkbox" checked style="accent-color: var(--accent); width: 18px; height: 18px;">
                </div>
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button id="diagBtn" style="flex: 1; padding: 14px; background: rgba(255,255,255,0.05); color: var(--text-dim); font-size: 11px;">
                <i class="fa-solid fa-vial"></i> DIAGNOSTIC
            </button>
            <button id="resetBtn" style="flex: 1; padding: 14px; background: rgba(255,255,255,0.05); color: var(--text-dim); font-size: 11px;">
                <i class="fa-solid fa-rotate"></i> RESET
            </button>
        </div>
    </div>
</div>

<footer class="footer-license">
    &copy; 2026 LICENSED BY
    <a href="https://github.com/FerFerStudio" target="_blank" class="studio-link">FERFER STUDIO</a>
</footer>

<script>
    const micSelect = document.getElementById('mic');
    const speakerSelect = document.getElementById('speaker');
    const muteBtn = document.getElementById('muteBtn');
    const micRing = document.getElementById('micIndicator');
    const status = document.getElementById('status');

    // --- HARDWARE API ---
    async function initHardware() {
        try {
            // Permission request to unlock device labels
            await navigator.mediaDevices.getUserMedia({ audio: true });

            const devices = await navigator.mediaDevices.enumerateDevices();

            micSelect.innerHTML = '';
            speakerSelect.innerHTML = '';

            devices.forEach(device => {
                const option = document.createElement('option');
                option.value = device.deviceId;
                option.text = device.label || `${device.kind} (${device.deviceId.slice(0, 5)})`;

                if (device.kind === 'audioinput') {
                    micSelect.appendChild(option);
                } else if (device.kind === 'audiooutput') {
                    speakerSelect.appendChild(option);
                }
            });
        } catch (err) {
            console.error("Hardware initialization failed:", err);
            micSelect.innerHTML = '<option>Mic Access Denied</option>';
        }
    }

    // --- LOGIC ---
    muteBtn.addEventListener('click', () => {
        const isMuted = muteBtn.classList.toggle('muted');
        muteBtn.innerHTML = isMuted ?
            '<i class="fa-solid fa-microphone"></i> UNMUTE' :
            '<i class="fa-solid fa-microphone-slash"></i> MUTE';
    });

    setInterval(() => {
        if(!muteBtn.classList.contains('muted')) {
            micRing.classList.toggle('active', Math.random() > 0.85);
        } else {
            micRing.classList.remove('active');
        }
    }, 150);

    document.getElementById('joinForm').addEventListener('submit', (e) => {
        e.preventDefault();
        status.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> ATTEMPTING HANDSHAKE...';
        status.style.color = 'var(--accent)';

        setTimeout(() => {
            status.innerHTML = '<i class="fa-solid fa-check-circle"></i> CONNECTED TO GEYSER';
            status.style.color = 'var(--success)';
        }, 2000);
    });

    // Start hardware engine
    initHardware();
    navigator.mediaDevices.ondevicechange = initHardware;
</script>

</body>
</html>
