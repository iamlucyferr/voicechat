<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR-VoiceChat 3.1 | FerFer Studio Edition</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
        :root {
            --bg: #080a0c;
            --panel: rgba(23, 28, 33, 0.75);
            --accent: #30D6FF; 
            --accent-glow: rgba(48, 214, 255, 0.3);
            --success: #00ff88;
            --danger: #ff3e3e;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 24px;
            position: relative;
        }

        .glass-panel {
            background: var(--panel);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .logo-section h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .logo-section span {
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .studio-tag {
            font-size: 10px;
            font-weight: 800;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 32px;
            display: block;
        }

        /* --- MIC VISUALIZER --- */
        .mic-visualizer {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mic-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--border);
            transition: 0.3s;
        }

        .mic-ring.active {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: scale(1.1);
        }

        .mic-icon {
            font-size: 32px;
            color: var(--text);
        }

        /* --- FORM --- */
        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 14px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 16px 14px 44px;
            color: white;
            font-family: inherit;
            font-size: 14px;
            transition: 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-connect {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-connect:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px var(--accent-glow);
        }

        .status-msg {
            margin-top: 24px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .settings-panel {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .device-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-dim);
        }

        select {
            background: transparent;
            color: white;
            border: none;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            max-width: 150px;
            text-align: right;
            outline: none;
        }

        .mute-btn {
            background: var(--border);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .mute-btn.muted {
            background: var(--danger);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glass-panel">
            <div class="logo-section">
                <h1>BR-VOICE <span>3.1</span></h1>
                <span class="studio-tag">FerFer Studio Edition</span>
            </div>

            <div class="mic-visualizer">
                <div class="mic-ring" id="micRing"></div>
                <i class="fa-solid fa-microphone-lines mic-icon"></i>
            </div>

            <form id="joinForm">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" placeholder="Minecraft Username" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-key"></i>
                    <input type="password" id="token" placeholder="Connection Token (/voice)" required>
                </div>
                <button type="submit" class="btn-connect" id="connectBtn">Connect to Geyser</button>
            </form>

            <div class="status-msg" id="status">
                <i class="fa-solid fa-circle-dot"></i> STANDBY MODE
            </div>

            <div class="settings-panel">
                <div class="device-row">
                    <span><i class="fa-solid fa-microphone"></i> INPUT</span>
                    <select id="micSelect">
                        <option>Detecting...</option>
                    </select>
                </div>
                <div class="device-row" style="margin-top: 8px;">
                    <button class="mute-btn" id="muteBtn">
                        <i class="fa-solid fa-microphone-slash"></i> MUTE
                    </button>
                    <span style="font-size: 10px; opacity: 0.5;">GEYSER BRIDGE ACTIVE</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const BACKEND_URL = "https://your-backend.render.com"; // Change to your Render/Railway URL
        
        let socket;
        let myPeer;
        let localStream;
        const peers = {};

        const status = document.getElementById('status');
        const micRing = document.getElementById('micRing');
        const muteBtn = document.getElementById('muteBtn');
        const micSelect = document.getElementById('micSelect');

        // --- HARDWARE INIT ---
        async function initHardware() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                micSelect.innerHTML = '';
                devices.forEach(device => {
                    if (device.kind === 'audioinput') {
                        const option = document.createElement('option');
                        option.value = device.deviceId;
                        option.text = device.label || `Mic ${micSelect.length + 1}`;
                        micSelect.appendChild(option);
                    }
                });
                
                // Visualizer Logic
                const audioContext = new AudioContext();
                const source = audioContext.createMediaStreamSource(localStream);
                const analyzer = audioContext.createAnalyser();
                source.connect(analyzer);
                
                function animate() {
                    const data = new Uint8Array(analyzer.frequencyBinCount);
                    analyzer.getByteFrequencyData(data);
                    const volume = data.reduce((a, b) => a + b) / data.length;
                    
                    if (volume > 10 && !muteBtn.classList.contains('muted')) {
                        micRing.classList.add('active');
                        micRing.style.transform = `scale(${1 + volume/100})`;
                    } else {
                        micRing.classList.remove('active');
                        micRing.style.transform = `scale(1)`;
                    }
                    requestAnimationFrame(animate);
                }
                animate();

            } catch (err) {
                console.error("Mic Access Denied:", err);
                status.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> MIC ACCESS DENIED';
                status.style.color = 'var(--danger)';
            }
        }

        // --- CONNECTION LOGIC ---
        document.getElementById('joinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const token = document.getElementById('token').value;

            status.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> AUTHENTICATING...';
            status.style.color = 'var(--accent)';

            // 1. Initialize PeerJS for Voice
            myPeer = new Peer(undefined, {
                host: '/',
                port: '443'
            });

            myPeer.on('open', id => {
                // 2. Connect to Backend Socket
                socket = io(BACKEND_URL);
                
                socket.emit('join-voice', {
                    username: username,
                    token: token,
                    peerId: id
                });

                socket.on('auth-success', () => {
                    status.innerHTML = '<i class="fa-solid fa-check-circle"></i> CONNECTED TO GEYSER';
                    status.style.color = 'var(--success)';
                    document.getElementById('connectBtn').style.display = 'none';
                });

                socket.on('auth-failed', () => {
                    status.innerHTML = '<i class="fa-solid fa-xmark-circle"></i> INVALID TOKEN';
                    status.style.color = 'var(--danger)';
                    myPeer.destroy();
                });

                // 3. Handle Voice Calls
                myPeer.on('call', call => {
                    call.answer(localStream);
                    const audio = document.createElement('audio');
                    call.on('stream', userStream => {
                        addAudioStream(audio, userStream);
                    });
                });

                socket.on('user-connected', (userId) => {
                    connectToNewUser(userId, localStream);
                });
            });
        });

        function connectToNewUser(userId, stream) {
            const call = myPeer.call(userId, stream);
            const audio = document.createElement('audio');
            call.on('stream', userStream => {
                addAudioStream(audio, userStream);
            });
            peers[userId] = call;
        }

        function addAudioStream(audio, stream) {
            audio.srcObject = stream;
            audio.addEventListener('loadedmetadata', () => {
                audio.play();
            });
        }

        // --- UI CONTROLS ---
        muteBtn.addEventListener('click', () => {
            const isMuted = muteBtn.classList.toggle('muted');
            localStream.getAudioTracks()[0].enabled = !isMuted;
            muteBtn.innerHTML = isMuted ?
                '<i class="fa-solid fa-microphone-slash"></i> MUTED' :
                '<i class="fa-solid fa-microphone"></i> MUTE';
        });

        initHardware();
    </script>
</body>
</html>
