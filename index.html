<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR-VoiceChat 3.1 | FerFer Studio Edition</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #080a0c;
            --panel: rgba(23, 28, 33, 0.75);
            --accent: #30D6FF;
            --accent-glow: rgba(48, 214, 255, 0.3);
            --success: #00ff88;
            --danger: #ff3e3e;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #101a25, var(--bg));
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        @media (max-width: 1024px) {
            .container { grid-template-columns: 1fr; max-width: 750px; }
        }

        .panel {
            background: var(--panel);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-weight: 800;
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--accent);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-group { margin-bottom: 15px; }
        label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input[type="text"], input[type="password"], select {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 15px;
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        button {
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            border-radius: 12px;
            border: none;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #joinbtn {
            background: var(--accent);
            color: #000;
            padding: 15px;
            width: 100%;
            font-size: 15px;
            margin-top: 10px;
        }

        #joinbtn.connected {
            background: var(--danger);
            color: white;
        }

        /* Functional Components */
        #log {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            font-family: 'monospace';
            font-size: 12px;
            height: 200px;
            overflow-y: auto;
            color: #a5b4fc;
            border: 1px solid var(--border);
            margin: 15px 0;
            white-space: pre-wrap;
        }

        .controls-row { display: flex; gap: 12px; margin-bottom: 20px; }

        #muteBtn {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid var(--border);
        }

        #muteBtn.muted {
            background: rgba(255, 62, 62, 0.2);
            color: var(--danger);
            border-color: var(--danger);
        }

        .mic-status-ring {
            width: 48px; height: 48px;
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
        }

        .mic-status-ring.active {
            color: var(--success);
            border-color: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        #status {
            font-size: 11px; padding: 10px 15px;
            background: rgba(48, 214, 255, 0.05);
            border-radius: 10px;
            color: var(--accent); border-left: 3px solid var(--accent);
            font-weight: 800;
            text-transform: uppercase;
        }

        .chat-area {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .footer-license {
            margin-top: 40px; text-align: center;
            font-size: 10px; color: var(--text-dim);
            letter-spacing: 2px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h1><i class="fa-solid fa-tower-broadcast"></i> Connect</h1>
        <form id="joinForm">
            <div class="input-group">
                <label for="username"><i class="fa-solid fa-user"></i> Username</label>
                <input type="text" id="username" required placeholder="Minecraft Name">
            </div>
            <div class="input-group">
                <label for="password"><i class="fa-solid fa-key"></i> Passcode</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <div class="input-group">
                <label for="mic"><i class="fa-solid fa-microphone"></i> Input Device</label>
                <select id="mic" name="mic"><option>Detecting...</option></select>
            </div>
            <div class="input-group">
                <label for="speaker"><i class="fa-solid fa-volume-high"></i> Output Device</label>
                <select id="speaker" name="speaker"><option value="default">System Default</option></select>
            </div>
            <button type="submit" id="joinbtn">JOIN SESSION</button>
        </form>
    </div>

    <div class="panel">
        <h1><i class="fa-solid fa-gears"></i> Live Status</h1>
        <div id="status">Waiting for user...</div>

        <div id="log">-- System Ready --</div>

        <div class="controls-row">
            <button id="muteBtn" class="unmuted"><i class="fa-solid fa-microphone"></i> MUTE</button>
            <div id="micIndicator" class="mic-status-ring"><i class="fa-solid fa-waveform-lines"></i></div>
            <button id="testSound" style="background: rgba(255,255,255,0.05); color: var(--text-dim); padding: 0 15px;">
                <i class="fa-solid fa-vial"></i> TEST
            </button>
        </div>

        <div class="chat-area">
            <input type="text" id="msgInput" placeholder="Send system command..." style="flex: 1;">
            <button id="messageButton" style="background: var(--accent); color: #000; width: 50px;">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<footer class="footer-license">
    &copy; 2026 POWERED BY <a href="#" style="color:var(--accent); text-decoration:none;">FERFER STUDIO</a>
</footer>

<script type="module">
    import { start } from '/client.js';

    const joinForm = document.getElementById('joinForm');
    const joinBtn = document.getElementById('joinbtn');
    const muteBtn = document.getElementById('muteBtn');
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const micIndicator = document.getElementById('micIndicator');

    let isMuted = false;
    let isConnected = false;

    // Helper to add logs
    const addLog = (msg) => {
        const time = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        logEl.innerHTML += `\n[${time}] ${msg}`;
        logEl.scrollTop = logEl.scrollHeight;
    };

    // Hardware Detection
    async function initHardware() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const devices = await navigator.mediaDevices.enumerateDevices();
            const micSelect = document.getElementById('mic');

            micSelect.innerHTML = '';
            devices.forEach(device => {
                if (device.kind === 'audioinput') {
                    const opt = document.createElement('option');
                    opt.value = device.deviceId;
                    opt.text = device.label || `Microphone ${micSelect.length + 1}`;
                    micSelect.appendChild(opt);
                }
            });
            stream.getTracks().forEach(t => t.stop()); // Clean up temp stream
            addLog("Hardware detected and ready.");
        } catch (e) {
            addLog("Error: Mic permission denied.");
            statusEl.innerText = "Error: Access Denied";
        }
    }

    // Mute Toggle
    muteBtn.onclick = () => {
        isMuted = !isMuted;
        muteBtn.classList.toggle('muted', isMuted);
        muteBtn.innerHTML = isMuted ? '<i class="fa-solid fa-microphone-slash"></i> UNMUTE' : '<i class="fa-solid fa-microphone"></i> MUTE';
        micIndicator.classList.toggle('active', !isMuted);
        addLog(isMuted ? "Microphone muted." : "Microphone unmuted.");
    };

    // Form Submission
    joinForm.onsubmit = (e) => {
        e.preventDefault();
        if (!isConnected) {
            isConnected = true;
            statusEl.innerHTML = '<i class="fa-solid fa-circle-dot fa-beat-fade"></i> ONLINE';
            statusEl.style.color = "var(--success)";
            joinBtn.innerText = "DISCONNECT";
            joinBtn.classList.add('connected');
            addLog(`Attempting connection for ${document.getElementById('username').value}...`);

            start(); // Trigger the logic from client.js
        } else {
            // Disconnect Logic
            location.reload();
        }
    };

    // Test Sound
    document.getElementById('testSound').onclick = () => {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
        addLog("Audio output test successful.");
    };

    initHardware();
</script>

</body>
</html>
